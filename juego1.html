<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partes Bersa-TPR9</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    color: white;
    background-color: #000;
    margin: 0;
  }

  h2 {
    margin: 15px;
    font-size: 25px;
  }

  .game-area {
    position: relative;
    width: 90%;
    max-width: 800px;
    margin: auto;
  }

  .game-area img {
    width: 100%;
    display: block;
  }

  .dropzone {
    position: absolute;
    width: 12%;
    height: 5%;
    border: 2px solid black;
    background: rgba(163,163,163,0.3);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.5s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  /* 🔥 SOLUCIÓN (NO TOCA NADA MÁS) */
  .dropzone .draggable {
    font-size: 11px;
    padding: 0;
    margin: 0;
    background: none !important;
  }

  /* POSICIONES */
  #zona1 { top: 8%; left: 15%; }
  #zona2 { top: 9.5%; left: 30%; }
  #zona3 { top: 9.8%; left: 58%; }
  #zona4 { top: 17%; left: 76.8%; }
  #zona5 { top: 45%; left: 75.4%; }
  #zona6 { top: 92.4%; left: 72%; }
  #zona7 { top: 64.5%; left: 47%; }
  #zona8 { top: 64%; left: 34%; }
  #zona9 { top: 56.8%; left: 24%; }
  #zona10 { top: 54.8%; left: 11%; }

  .correct {
    background: rgba(30,255,0,0.7);
  }

  .incorrect {
    background: rgba(255,0,0,0.7);
  }

  .items {
    margin-top: 20px;
  }

  .draggable {
    display: inline-block;
    padding: 15px;
    margin: 15px;
    font-size: 13px;
    background: white;
    color: black;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }
  

  @media (max-width: 600px) {
    h2 {
      font-size: 18px;
    }

    .draggable {
      padding: 12px;
      font-size: 15px;
    }

    .dropzone .draggable {
      font-size: 8px;
      padding: 0;
      margin: 0;
      background: none !important;
    }
  }
</style>

</head>
<body>

<h2>Partes Bersa-TPR9</h2>

<div class="game-area">
  <img src="./arma_plantilla.png">

  <div class="dropzone" id="zona1" data-match="p1"></div>
  <div class="dropzone" id="zona2" data-match="p2"></div>
  <div class="dropzone" id="zona3" data-match="p3"></div>
  <div class="dropzone" id="zona4" data-match="p4"></div>
  <div class="dropzone" id="zona5" data-match="p5"></div>
  <div class="dropzone" id="zona6" data-match="p6"></div>
  <div class="dropzone" id="zona7" data-match="p7"></div>
  <div class="dropzone" id="zona8" data-match="p8"></div>
  <div class="dropzone" id="zona9" data-match="p9"></div>
  <div class="dropzone" id="zona10" data-match="p10"></div>
</div>

<div class="items"></div>

<script>
const dropzones = document.querySelectorAll('.dropzone');
const containerItems = document.querySelector('.items');

let seleccionActual = null;

let opciones = [
  { id: "p1", texto: "Guión" },
  { id: "p2", texto: "Corredera" },
  { id: "p3", texto: "Alza" },
  { id: "p4", texto: "Martillo" },
  { id: "p5", texto: "Seguro y Decocker" },
  { id: "p6", texto: "Empuñadura" },
  { id: "p7", texto: "Retén del cargador" },
  { id: "p8", texto: "Retén de corredera" },
  { id: "p9", texto: "Palanca de desarme" },
  { id: "p10", texto: "Riel Picatinny" }
];

function mezclar(array) {
  return array.sort(() => Math.random() - 0.5);
}

let opcionesRestantes = mezclar([...opciones]);

function mostrarSiguiente() {
  containerItems.innerHTML = "";

  if (opcionesRestantes.length === 0) {
    containerItems.innerHTML = "<b>🎉 Aprobaste!:) 🎉</b>";
    return;
  }

  const opcion = opcionesRestantes[0];

  const div = document.createElement("div");
  div.classList.add("draggable");
  div.id = opcion.id;
  div.textContent = opcion.texto;

  div.addEventListener('click', () => {
    seleccionActual = div;
    div.style.background = "black";
    div.style.color = "white";
    div.style.border = "2px solid white";
  });

  containerItems.appendChild(div);
}

function reiniciarJuego() {
  dropzones.forEach(zone => {
    zone.innerHTML = "";
    zone.classList.remove('correct', 'incorrect');
  });

  opcionesRestantes = mezclar([...opciones]);
  seleccionActual = null;

  mostrarSiguiente();
}

dropzones.forEach(zone => {
  zone.addEventListener('click', () => {
    if (!seleccionActual) return;

    if (zone.dataset.match === seleccionActual.id) {
      zone.classList.add('correct');
      zone.appendChild(seleccionActual);

      // 🔥 RESET ESTILOS
      seleccionActual.style.background = "none";
      seleccionActual.style.color = "black";
      seleccionActual.style.border = "none";

      opcionesRestantes.shift();
      seleccionActual = null;

      setTimeout(() => {
        mostrarSiguiente();
      }, 500);

    } else {
      zone.classList.add('incorrect');
      zone.appendChild(seleccionActual);

      // 🔥 RESET ESTILOS
      seleccionActual.style.background = "none";
      seleccionActual.style.color = "black";
      seleccionActual.style.border = "none";

      seleccionActual = null;

      setTimeout(() => {
        reiniciarJuego();
      }, 1500);
    }
  });
});

mostrarSiguiente();
</script>

</body>
</html>
